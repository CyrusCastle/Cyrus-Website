<style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: auto;
    }

    #pdf-container {
      width: 100vw;
      height: 100vh;
      overflow-y: scroll;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #eee;
    }

    #pdf-container::-webkit-scrollbar {
      display: none;
    }

    #pdf-container {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .pdf-page-canvas {
      width: 100%;
      height: auto;
      margin-bottom: 20px;
      background: white;
    }
</style>

<script src="http://localhost:8080/composeResources/cyruswebsite.composeapp.generated.resources/files/pdf.mjs" type="module"></script>

<div id="pdf-container"></div>

<script>
    // public drag variable, plus some binding
    window.draggable = true;
    function updateCursor() {
        const container = document.getElementById('pdf-container');
        if (!container) return;

        if (window.draggable) {
            container.style.cursor = 'grab';
        } else {
            container.style.cursor = 'default';
        }
    }
    Object.defineProperty(window, 'draggable', {
        set(value) {
            this._draggable = value;
            updateCursor();
        },
        get() {
            return this._draggable;
        }
    });

    // Initialize
    window._draggable = true;
    updateCursor();

    // ================================
    // HtmlScroller Interop
    // ================================

    NewHtmlScroller = (function () {
        const container = document.getElementById("pdf-container");

        function maxScroll() {
            return container
                ? Math.max(0, container.scrollHeight - container.clientHeight)
                : 0;
        }

        return {
            // a1. Current scroll (px)
            getCurrentScroll() {
                return container ? container.scrollTop : 0;
            },

            // a2. Max scroll (px)
            getMaxScroll() {
                return maxScroll();
            },

            // a3. Scroll by (px)
            scrollBy(amount) {
                if (!container) return;

                const top = Math.min(
                    maxScroll(),
                    Math.max(0, container.scrollTop + amount)
                );

                container.scrollTo({
                    top,
                    behavior: "auto"
                });
            },

            // a4. create listener
            addScrollListener(callback) {
                if (!container) return;

                container.addEventListener("scroll", callback);
            },

            removeScrollListener(callback) {
                if (!container) return;

                container.removeEventListener("scroll", callback);
            },
    };
    })();

    NewHtmlZoomer = (function () {
        return {
            // b1. Zoom in
            zoomIn() {
                window.zoomIn()
            },

            // b2. Zoom out
            zoomOut() {
                window.zoomOut()
            },

            // b3. Set zoom
            setZoom(amount){
                window.setZoom(amount)
            },

            // b4. Get zoom
            getZoom() {
                return window.currentScale
            },

            getMaxZoom() {
                return window.currentScale
            },

            getMinZoom() {
                return window.currentScale
            },
        };
    })();

    NewHtmlCursorHandler = (function () {
        return {
            // c1. Get draggable
            getDraggable() {
                window.draggable ??= true

                return window.draggable;
            },

            // c2. Toggle draggable
            toggleDraggable() {
                window.draggable = !window.draggable;
            }
        };
    })();

    HtmlController = (function () {
        return {
            // x1. Scroller
            getScroller() {
                return NewHtmlScroller;
            },

            // x2. Zoomer
            getZoomer() {
                return NewHtmlZoomer;
            },

            // x3. CursorHandler
            getCursorHandler() {
                return NewHtmlCursorHandler;
            },
        };
    })();

    // ================================
    // DRAG TO SCROLL
    // ================================
    (function() {
        const container = document.getElementById("pdf-container");

        let isDown = false;
        let startY;
        let scrollTop;

        container.addEventListener("mousedown", (e) => {
            if (!window.draggable) return;

            isDown = true;
            container.classList.add("dragging");
            startY = e.pageY - container.offsetTop;
            scrollTop = container.scrollTop;
        });

        container.addEventListener("mouseleave", () => {
            isDown = false;
            container.classList.remove("dragging");
        });

        container.addEventListener("mouseup", () => {
            isDown = false;
            container.classList.remove("dragging");
        });

        container.addEventListener("mousemove", (e) => {
            if (!isDown) return;
            e.preventDefault();
            const y = e.pageY - container.offsetTop;
            const walk = (y - startY) * 1.5;
            container.scrollTop = scrollTop - walk;
        });
    })();
</script>

<style>
    #pdf-container.dragging {
        cursor: grabbing !important;
    }
</style>

<script type="module">
    import * as pdfjsLib from "http://localhost:8080/composeResources/cyruswebsite.composeapp.generated.resources/files/pdf.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "http://localhost:8080/composeResources/cyruswebsite.composeapp.generated.resources/files/pdf.worker.mjs";

    const params = new URLSearchParams(window.location.search);
    const file = params.get("file") || "cv.pdf"; // default fallback

const pdfUrl =
  "http://localhost:8080/composeResources/cyruswebsite.composeapp.generated.resources/files/" + file;

let pdfDoc = null;
window.currentScale ??= 0.75;

//function getContainer() {
//  return document.getElementById("pdf-container");
//}

const container = document.getElementById("pdf-container");

let loaded = false;

// Load the PDF once
async function loadPdf() {
  pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
  await renderPdf(true);
}

// Render all pages
async function renderPdf(firstRender) {
  //const container = getContainer();
  //if (!container) return;

  // Clear previous content
  container.innerHTML = "";

  for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
    if (firstRender) {
        console.log(" - first render boy");
    }

    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({ scale: window.currentScale });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    container.appendChild(canvas);

    await page.render({
      canvasContext: context,
      viewport: viewport,
    }).promise;
  }

  loaded = true;
  if (firstRender) {
    window.dispatchEvent(new Event("pdf-ready"));
  }
}

window.renderPdf = function () {
    console.log("They forcin me to render again");
    renderPdf(false);
};

// Public zoom functions
window.zoomIn = function () {
  currentScale += 0.25;
  renderPdf(false);
};

window.zoomOut = function () {
  currentScale = Math.max(0.25, currentScale - 0.25);
  renderPdf(false);
};

window.setZoom = function (amount) {
    currentScale = amount;
    if (loaded){
        renderPdf(false);
    }
};

// Start
loadPdf();

</script>
